  hero:{img:"hero",tag:{en:"Architecture · Construction · Fit-Out",ar:"تصميم معماري · بناء · تشطيبات"},title:{en:'Crafting Spaces That <em>Inspire</em>',ar:'نصنع مساحات <em>تُلهم</em>'},sub:{en:"Transforming visions into architectural masterpieces across Oman since 2019",ar:"نحوّل الرؤى إلى تحف معمارية في عُمان منذ ٢٠١٩"},btn1:{en:"View Our Work",ar:"اكتشف أعمالنا"},btn2:{en:"Start a Project",ar:"ابدأ مشروعك"}},
  about:{img:"about",tag:{en:"About Carbon",ar:"عن كاربون"},title:{en:'Inspired by <em>Vision 2040</em>',ar:'مستوحاة من <em>رؤية ٢٠٤٠</em>'},desc:{en:"Established in 2019, Carbon Engineering Design was born to meet the evolving needs of clients across Oman. We deliver sustainable, high-quality solutions — from concept to completion — for both residential and commercial projects. Time, quality, and communication are our highest priorities.",ar:"تأسست كاربون للاستشارات الهندسية في عام ٢٠١٩ لتلبية احتياجات العملاء المتطورة في عُمان. نقدم حلولاً مستدامة وعالية الجودة — من المفهوم إلى التسليم — للمشاريع السكنية والتجارية."},stats:[{n:"6+",en:"Years",ar:"سنوات"},{n:"50+",en:"Projects",ar:"مشروع"},{n:"6000+",en:"SQM Built",ar:"م² منجز"}]},
  founder:{tag:{en:"The Founder",ar:"المؤسس"},name:{en:"Sultan <em>Al Dhukhri</em>",ar:"سلطان <em>الذخري</em>"},role:{en:"Founder & Chief Executive Officer",ar:"المؤسس والرئيس التنفيذي"},quote:{en:"I founded Carbon with a singular belief — that every space we build should tell a story, outlast trends, and elevate the lives of those who inhabit it.",ar:"أسست كاربون بقناعة واحدة — أن كل مساحة نبنيها يجب أن تروي قصة، وتتجاوز الصيحات، وترتقي بحياة من يعيش فيها."},bio:{en:"Driven by Oman's Vision 2040 and a deep passion for architectural excellence, Sultan Al Dhukhri established Carbon Engineering Design in 2019. Starting from a clear vision — that Omani projects deserve world-class design paired with meticulous execution — he built a multidisciplinary firm spanning architecture, construction, interior fit-out, and joinery. Under his leadership, Carbon has delivered landmark projects for clients including Bank Muscat, Port of Duqm, Khazaen Economic City, and the Ministry of Housing, earning a reputation for uncompromising quality and timely delivery.",ar:"مدفوعاً برؤية عُمان ٢٠٤٠ وشغف عميق بالتميز المعماري، أسس سلطان الذخري شركة كاربون للاستشارات الهندسية في ٢٠١٩. انطلاقاً من رؤية واضحة بأن المشاريع العُمانية تستحق تصميماً عالمياً مقروناً بتنفيذ دقيق، بنى شركة متعددة التخصصات. تحت قيادته، نفذت كاربون مشاريع بارزة لعملاء مثل بنك مسقط وميناء الدقم ومدينة خزائن الاقتصادية ووزارة الإسكان."},img:"sultan"},

// IMAGE COMPRESS
function compressImg(file){return new Promise(r=>{const rd=new FileReader();rd.onload=e=>{const img=new Image();img.onload=()=>{const c=document.createElement('canvas');const M=600;let w=img.width,h=img.height;if(w>h){if(w>M){h*=M/w;w=M}}else{if(h>M){w*=M/h;h=M}}c.width=w;c.height=h;c.getContext('2d').drawImage(img,0,0,w,h);r(c.toDataURL('image/jpeg',.6))};img.src=e.target.result};rd.readAsDataURL(file)})}
function imgUp(inp,hid){const f=inp.files[0];if(!f)return;const pr=document.getElementById(hid+'_pr');if(pr){pr.style.display='block';pr.querySelector('.bar').style.width='40%'}compressImg(f).then(b64=>{document.getElementById(hid).value=b64;const pv=inp.parentElement.querySelector('.img-prev');if(pv){pv.src=b64;pv.style.display='block'}if(pr){pr.querySelector('.bar').style.width='100%';setTimeout(()=>pr.style.display='none',600)}})}
function imgHTML(id,cur,l){return`<div class="fg" style="margin-bottom:12px"><label>${l}</label>${cur&&cur.length>5?`<img src="${gI(cur)}" class="img-prev" style="display:block">`:'<img class="img-prev">'}<input type="file" accept="image/*" onchange="imgUp(this,'${id}')" style="margin-top:6px"><input type="hidden" id="${id}" value=""><div class="upload-prog" id="${id}_pr"><div class="bar"></div></div></div>`}

function aCli(){let h='<h3>Clients</h3><div class="als">';D.clients.items.forEach((c,i)=>{h+=`<div class="ai"><div><h4>${c.en}</h4><p>${c.ar}</p></div><div class="aa"><button class="ae" onclick="eCli(${i})">Edit</button><button class="adl" onclick="dCli(${i})">Del</button></div></div>`});h+='</div><button class="aad" onclick="nCli()">+ Add</button>';document.getElementById('ap_clients').innerHTML=h}
function eCli(i){const c=D.clients.items[i];openM(`<h3>Edit</h3>${textF('ce','EN',c.en)}${textF('ca','AR',c.ar,1)}<div style="display:flex;gap:6px;margin-top:12px"><button class="btn btn-g" onclick="sCli(${i})">Save</button><button class="btn btn-o" onclick="clM()">Cancel</button></div>`)}
async function sCli(i){D.clients.items[i]={en:gv('ce'),ar:gv('ca')};await save();renderAll();aCli();clM();toast('✅')}
async function dCli(i){if(!confirm('Delete?'))return;D.clients.items.splice(i,1);await save();renderAll();aCli();toast('Deleted')}
function nCli(){openM(`<h3>Add</h3>${textF('ce','EN','')}${textF('ca','AR','',1)}<div style="display:flex;gap:6px;margin-top:12px"><button class="btn btn-g" onclick="doNCli()">Add</button><button class="btn btn-o" onclick="clM()">Cancel</button></div>`)}
async function doNCli(){D.clients.items.push({en:gv('ce'),ar:gv('ca')});await save();renderAll();aCli();clM();toast('✅')}

function aVis(){let h='<h3>Vision/Mission/Values</h3><div class="als">';D.vision.items.forEach((v,i)=>{h+=`<div class="ai"><div><h4>${v.tEn}/${v.tAr}</h4></div><div class="aa"><button class="ae" onclick="eVis(${i})">Edit</button><button class="adl" onclick="dVis(${i})">Del</button></div></div>`});h+='</div><button class="aad" onclick="nVis()">+ Add</button>';document.getElementById('ap_vision').innerHTML=h}
function eVis(i){const v=D.vision.items[i];openM(`<h3>Edit</h3>${textF('vte','Title EN',v.tEn)}${textF('vta','Title AR',v.tAr,1)}${areaF('ve','Text EN',v.en)}${areaF('va','Text AR',v.ar,1)}<div style="display:flex;gap:6px;margin-top:12px"><button class="btn btn-g" onclick="sVis(${i})">Save</button><button class="btn btn-o" onclick="clM()">Cancel</button></div>`)}
async function sVis(i){D.vision.items[i]={tEn:gv('vte'),tAr:gv('vta'),en:gv('ve'),ar:gv('va')};await save();renderAll();aVis();clM();toast('✅')}
async function dVis(i){if(!confirm('Delete?'))return;D.vision.items.splice(i,1);await save();renderAll();aVis();toast('Deleted')}
function nVis(){openM(`<h3>Add</h3>${textF('vte','Title EN','')}${textF('vta','Title AR','',1)}${areaF('ve','Text EN','')}${areaF('va','Text AR','',1)}<div style="display:flex;gap:6px;margin-top:12px"><button class="btn btn-g" onclick="doNVis()">Add</button><button class="btn btn-o" onclick="clM()">Cancel</button></div>`)}
async function doNVis(){D.vision.items.push({tEn:gv('vte'),tAr:gv('vta'),en:gv('ve'),ar:gv('va')});await save();renderAll();aVis();clM();toast('✅')}

function aCont(){let h='<h3>Contact Info</h3><div class="als">';D.contact.info.forEach((c,i)=>{h+=`<div class="ai"><div><h4><i class="fas ${c.icon}" style="color:var(--gold);margin-right:5px"></i>${c.tEn}</h4><p>${c.en.split('\n')[0]}</p></div><div class="aa"><button class="ae" onclick="eCtI(${i})">Edit</button></div></div>`});h+='</div>';document.getElementById('ap_contact').innerHTML=h}
function eCtI(i){const c=D.contact.info[i];openM(`<h3>Edit</h3>${textF('cte','Title EN',c.tEn)}${textF('cta','Title AR',c.tAr,1)}${areaF('cce','Content EN',c.en)}${areaF('cca','Content AR',c.ar,1)}<div style="display:flex;gap:6px;margin-top:12px"><button class="btn btn-g" onclick="sCtI(${i})">Save</button><button class="btn btn-o" onclick="clM()">Cancel</button></div>`)}
async function sCtI(i){D.contact.info[i].tEn=gv('cte');D.contact.info[i].tAr=gv('cta');D.contact.info[i].en=gv('cce');D.contact.info[i].ar=gv('cca');await save();renderAll();aCont();clM();toast('✅')}

function aInq(){let h=`<h3>Inquiries (${inqs.length})</h3>`;if(!inqs.length)h+='<p style="color:var(--gray);padding:14px">No inquiries.</p>';h+='<div class="als">';inqs.forEach((q,i)=>{h+=`<div class="ai" style="flex-direction:column;align-items:stretch"><div style="display:flex;justify-content:space-between;flex-wrap:wrap;gap:6px"><div><h4>${q.name}</h4><p>${q.email}|${q.phone||'-'}|${q.type}|${q.date?new Date(q.date).toLocaleDateString():''}</p></div><div class="aa"><button class="adl" onclick="rmInq(${i})">Del</button></div></div>${q.details?`<p style="margin-top:5px;font-size:11px;color:var(--white)">${q.details}</p>`:''}</div>`});h+='</div>';document.getElementById('ap_inq').innerHTML=h}
async function rmInq(i){await delInq(i);aInq();toast('Deleted')}

function aSet(){const fc=JSON.parse(localStorage.getItem('carbon_fb_config')||'null');document.getElementById('ap_settings').innerHTML=`<h3>Settings</h3>${textF('spw','Password',D.settings?.pw||'carbon2025')}${textF('sfe','Footer EN',D.footer.desc.en)}${textF('sfa','Footer AR',D.footer.desc.ar,1)}<button class="btn btn-g" onclick="sSet()">💾 Save</button><hr style="border-color:var(--gold-d);margin:20px 0"><h3>🔥 Firebase</h3><p class="desc" style="margin-bottom:12px">Status: <strong style="color:${firebaseReady?'#4CAF50':'#FF5252'}">${firebaseReady?'🟢 Connected':'🔴 Not connected'}</strong></p>${textF('fak','API Key',fc?.apiKey||'')}${textF('fad','Auth Domain',fc?.authDomain||'')}${textF('fpi','Project ID',fc?.projectId||'')}${textF('fsb','Storage Bucket',fc?.storageBucket||'')}${textF('fsi','Sender ID',fc?.messagingSenderId||'')}${textF('fai','App ID',fc?.appId||'')}<div style="display:flex;gap:8px;margin-top:12px;flex-wrap:wrap"><button class="btn btn-g" onclick="saveFB()">🔥 Connect Firebase</button>${fc?'<button class="btn btn-o" style="border-color:var(--red);color:var(--red)" onclick="localStorage.removeItem(\'carbon_fb_config\');location.reload()">Disconnect</button>':''}</div><hr style="border-color:var(--gray-d);margin:20px 0"><button class="btn btn-o" onclick="if(confirm('Reset ALL?')){localStorage.removeItem('carbon_cms');location.reload()}">🔄 Reset Defaults</button>`}
async function sSet(){D.settings={pw:gv('spw')};D.footer.desc={en:gv('sfe'),ar:gv('sfa')};await save();renderAll();toast('✅ Saved!')}
async function saveFB(){const c={apiKey:gv('fak'),authDomain:gv('fad'),projectId:gv('fpi'),storageBucket:gv('fsb'),messagingSenderId:gv('fsi'),appId:gv('fai')};if(!c.apiKey||!c.projectId){toast('❌ API Key & Project ID required');return}localStorage.setItem('carbon_fb_config',JSON.stringify(c));toast('⏳ Connecting...');try{firebase.initializeApp(c);db=firebase.firestore();firebaseReady=true;await db.collection('site').doc('cms').set(D);for(const q of inqs){if(typeof q.id==='number')await db.collection('inquiries').add(q)}toast('✅ Firebase connected!');setTimeout(()=>location.reload(),1000)}catch(e){toast('❌ Error: '+e.message);localStorage.removeItem('carbon_fb_config')}}

// INIT
(async()=>{try{await loadData();renderAll()}catch(e){console.error('Init error:',e);D=JSON.parse(JSON.stringify(DEF));renderAll()}finally{setTimeout(()=>document.getElementById('ld').classList.add('h'),400)}})();
window.addEventListener('scroll',()=>{document.getElementById('nav').classList.toggle('sc',scrollY>40)});
document.querySelectorAll('.rv').forEach(el=>{new IntersectionObserver(([e])=>{if(e.isIntersecting)e.target.classList.add('v')},{threshold:.07}).observe(el)});
document.addEventListener('keydown',e=>{if(e.key==='Escape'){document.getElementById('lbx').classList.remove('o');clM();clA()}});
</script></body></html>
